<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Змейка с препятствиями</title>
  <style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0f1419;
  --surface: #1a2332;
  --surface-light: #243044;
  --accent: #22c55e;
  --accent-hover: #16a34a;
  --danger: #ef4444;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --border: #334155;
  --shadow: rgba(0, 0, 0, 0.4);
}

body {
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, -apple-system, Sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(34, 197, 94, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem;
  overflow: hidden; /* Предотвращаем скролл на мобилках */
  touch-action: none; /* Отключаем стандартные жесты браузера */
}

.app {
  width: 100%;
  max-width: 680px;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  height: 100%;
  justify-content: center;
}

.header {
  text-align: center;
}

.header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 1rem;
  background: linear-gradient(135deg, var(--accent), #4ade80);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0.625rem 1.25rem;
  min-width: 90px;
  box-shadow: 0 4px 12px var(--shadow);
}

.stat-label {
  display: block;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 0.25rem;
}

.stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
}

.game-area {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#game-canvas {
  display: block;
  border-radius: 12px;
  border: 2px solid var(--border);
  box-shadow: 0 8px 32px var(--shadow);
  background: #0a0f14;
  max-width: 100%;
  height: auto;
  touch-action: none;
}

.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(15, 20, 25, 0.85);
  backdrop-filter: blur(4px);
  border-radius: 12px;
  z-index: 10;
}

.overlay.hidden {
  display: none;
}

.overlay-content {
  text-align: center;
  padding: 2rem;
  max-width: 360px;
}

.overlay-content h2 {
  font-size: 1.5rem;
  margin-bottom: 0.75rem;
}

.overlay-content p {
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.btn {
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  padding: 0.75rem 2rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
}

.btn:active {
  transform: scale(0.95);
}

.btn-primary {
  background: var(--accent);
  color: #052e16;
  box-shadow: 0 4px 16px rgba(34, 197, 94, 0.35);
}

.btn-primary:hover {
  background: var(--accent-hover);
  box-shadow: 0 6px 20px rgba(34, 197, 94, 0.45);
}

.controls-hint {
  margin-top: 1.5rem;
  font-size: 0.8125rem;
  color: var(--text-muted);
}

.controls-hint p {
  margin-bottom: 0.5rem;
}

.controls-hint p:last-child {
  margin-bottom: 0;
}

kbd {
  display: inline-block;
  background: var(--surface-light);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.125rem 0.375rem;
  font-family: inherit;
  font-size: 0.75rem;
  color: var(--text);
}

.mobile-controls {
  display: none;
  grid-template-areas: 
    ". up ."
    "left . right"
    ". down .";
  gap: 10px;
  margin-top: 20px;
  user-select: none;
}

.control-btn {
  width: 60px;
  height: 60px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  font-size: 24px;
  box-shadow: 0 4px 8px var(--shadow);
  -webkit-tap-highlight-color: transparent;
}

.control-btn:active {
  background: var(--surface-light);
  transform: scale(0.9);
}

.control-btn.up { grid-area: up; }
.control-btn.down { grid-area: down; }
.control-btn.left { grid-area: left; }
.control-btn.right { grid-area: right; }

.footer {
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: auto;
  padding-top: 1rem;
}

.github-warning {
  display: none;
  background: #451a1a;
  border: 1px solid #ef4444;
  color: #fecaca;
  padding: 0.75rem 1rem;
  border-radius: 8px;
  font-size: 0.875rem;
  line-height: 1.5;
  text-align: center;
}

.github-warning.visible {
  display: block;
}

.github-warning a {
  color: #4ade80;
}

@media (max-width: 768px) {
  body {
    padding: 0.5rem;
  }

  .app {
    gap: 0.75rem;
  }

  .header h1 {
    font-size: 1.25rem;
    margin-bottom: 0.5rem;
  }

  .stats {
    gap: 0.5rem;
  }

  .stat {
    min-width: 70px;
    padding: 0.4rem 0.75rem;
  }

  .stat-value {
    font-size: 1.1rem;
  }

  .controls-hint {
    display: none;
  }

  .mobile-controls {
    display: grid;
  }
  
  .footer {
    display: none;
  }
}

@media (max-height: 700px) and (max-width: 768px) {
  .mobile-controls {
    margin-top: 10px;
  }
  .control-btn {
    width: 50px;
    height: 50px;
  }
}
  </style>
</head>
<body>
  <div class="app">
    <div id="github-warning" class="github-warning"></div>

    <header class="header">
      <h1>Змейка с препятствиями</h1>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Счёт</span>
          <span id="score" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Рекорд</span>
          <span id="high-score" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Уровень</span>
          <span id="level" class="stat-value">1</span>
        </div>
      </div>
    </header>

    <main class="game-area">
      <canvas id="game-canvas" width="600" height="600" aria-label="Игровое поле"></canvas>

      <div id="overlay" class="overlay">
        <div class="overlay-content">
          <h2 id="overlay-title">Змейка с препятствиями</h2>
          <p id="overlay-message">Собирайте яблоки, избегайте препятствий и не врезайтесь в себя!</p>
          <button id="start-btn" class="btn btn-primary">Начать игру</button>
          <div class="controls-hint">
            <p><kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> или <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> — управление</p>
            <p><kbd>P</kbd> или <kbd>Space</kbd> — пауза</p>
          </div>
        </div>
      </div>

      <div class="mobile-controls">
        <button class="control-btn up" data-dir="ArrowUp">↑</button>
        <button class="control-btn left" data-dir="ArrowLeft">←</button>
        <button class="control-btn right" data-dir="ArrowRight">→</button>
        <button class="control-btn down" data-dir="ArrowDown">↓</button>
      </div>
    </main>

    <footer class="footer">
      <p>HTML5 Canvas · LocalStorage · ES6+</p>
    </footer>
  </div>

  <script>
    (function () {
      var path = location.pathname;
      var warning = document.getElementById('github-warning');

      if (location.hostname === 'github.com' && path.indexOf('/blob/') !== -1) {
        var parts = path.split('/');
        var user = parts[1];
        var repo = parts[2];
        warning.innerHTML =
          'Вы открыли файл через просмотр GitHub — игра здесь не работает. ' +
          'Откройте сайт через GitHub Pages: ' +
          '<a href="https://' + user + '.github.io/' + repo + '/">https://' +
          user + '.github.io/' + repo + '/</a> ' +
          '(сначала включите Pages в Settings → Pages).';
        warning.classList.add('visible');
      }
    })();

    function onScriptError() {
      var msg = document.getElementById('overlay-message');
      if (msg) {
        msg.textContent =
          'Не удалось загрузить js/app.js. Загрузите в репозиторий папку js/ с файлом app.js.';
      }
    }
  </script>
  <script src="./js/app.js" defer onerror="onScriptError()"></script>
</body>
</html>
